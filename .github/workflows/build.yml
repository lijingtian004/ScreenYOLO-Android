name: Build ScreenYOLO APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Install required SDK components
        run: |
          sdkmanager "platforms;android-34"
          sdkmanager "build-tools;34.0.0"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Export YOLOv8 models
        run: |
          pip install "numpy<2" scipy pillow opencv-python pyyaml requests matplotlib
          pip install ultralytics
          python3 << 'EOF'
          from ultralytics import YOLO
          model = YOLO('yolov8n.pt')
          # TFLite FP32
          model.export(format='tflite')
          # TFLite INT8 (full integer quantization)
          model.export(format='tflite', int8=True, data='coco128.yaml')
          # ONNX
          model.export(format='onnx')
          EOF
          mkdir -p app/src/main/assets
          cp yolov8n_saved_model/yolov8n_float32.tflite app/src/main/assets/
          cp yolov8n_saved_model/yolov8n_full_integer_quant.tflite app/src/main/assets/ || echo "INT8 model may have different name"
          # Find and copy INT8 model with flexible name
          find yolov8n_saved_model -name "*int*.tflite" -exec cp {} app/src/main/assets/yolov8n_full_integer_quant.tflite \;
          cp yolov8n.onnx app/src/main/assets/

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - name: Build APK
        run: gradle assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ScreenYOLO-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
