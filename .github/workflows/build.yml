name: Build ScreenYOLO APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Install required SDK components
        run: |
          sdkmanager "platforms;android-34"
          sdkmanager "build-tools;34.0.0"
          sdkmanager "ndk;25.2.9519653"
          sdkmanager "cmake;3.22.1"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup NCNN
        run: |
          curl -L -o /tmp/ncnn-android.zip "https://github.com/Tencent/ncnn/releases/download/20260113/ncnn-20260113-android-vulkan.zip"
          unzip -q /tmp/ncnn-android.zip -d /tmp/
          cp -r /tmp/ncnn-20260113-android-vulkan/arm64-v8a app/src/main/cpp/ncnn

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - name: Build APK
        run: gradle assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ScreenYOLO-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
